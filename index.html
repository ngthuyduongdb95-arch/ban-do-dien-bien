<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hệ thống WebGIS quản lý dịch bệnh động vật</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div>SỞ NÔNG NGHIỆP VÀ MÔI TRƯỜNG TỈNH ĐIỆN BIÊN</div>
            <div>CHI CỤC NÔNG NGHIỆP</div>
        </div>

        <h1>HỆ THỐNG WEBGIS QUẢN LÝ DỊCH BỆNH ĐỘNG VẬT</h1>
    </header>

    <!-- Dashboard -->
    <section class="dashboard">

    <div class="card">
        <i class="fa-solid fa-map-location-dot"></i>
        <span class="number">45</span>
        <span class="title">Xã, phường</span>
    </div>

    <div class="card">
        <i class="fa-solid fa-virus"></i>
        <span class="number">0</span>
        <span class="title">Xã có DTLCP</span>
    </div>

    <div class="card">
        <i class="fa-solid fa-drumstick-bite"></i>
        <span class="number">0</span>
        <span class="title">Xã có CGC</span>
    </div>

    <div class="card">
        <i class="fa-solid fa-cow"></i>
        <span class="number">0</span>
        <span class="title">Xã có VDNC</span>
    </div>

    <div class="card">
        <i class="fa-solid fa-pump-soap"></i>
        <span class="number">39</span>
        <span class="title">Đã phun phòng</span>
    </div>

    <div class="card">
        <i class="fa-solid fa-capsules"></i>
        <span class="number">87</span>
        <span class="title">CSBB thuốc TY</span>
    </div>

</section>

    <!-- Nội dung -->
    <main class="container">

        <!-- Menu -->
        <aside class="sidebar">

        </aside>

        <!-- Bản đồ -->
        <section class="map-area">

        </section>

        <!-- Thông tin -->
        <aside class="info-panel">

        </aside>

    </main>

</body>

</html>
